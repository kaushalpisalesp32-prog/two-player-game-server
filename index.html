<!DOCTYPE html>
<html>
<head>
    <title>Tic Tac Toe</title>
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: #f0f0f0;
            font-family: Arial, sans-serif;
        }
        .cell {
            border: 2px solid #333;
            height: 100px;
            width: 100px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 2rem;
            font-weight: bold;
            background-color: white;
            cursor: pointer;
            user-select: none;
        }
        .cell:hover {
            background-color: #eee;
        }
    </style>
</head>
<body>

    <div id="board" style="display: grid; grid-template-columns: repeat(3, 104px); gap: 5px;"></div>

    <!-- Automatically utilizes the server's own socket client to guarantee version matching -->
    <script src="/socket.io/socket.io.js"></script>
    <script>
        // Connecting relatively to the same domain automatically
        const socket = io(); 
        const board = document.getElementById('board');
        
        socket.on('gameState', (state) => {
            board.innerHTML = '';
            state.board.forEach((cell, i) => {
                const div = document.createElement('div');
                div.className = 'cell';
                div.innerText = cell || '';
                div.onclick = () => socket.emit('makeMove', i);
                board.appendChild(div);
            });
        });
    </script>
</body>
</html>
